services:
  - type: web
    name: bungkus-backend
    runtime: node
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        value: https://sptx-dev.github.io
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DB_PATH
        value: ./bungkus.db
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@bungkus.com
      - key: DEFAULT_ADMIN_PASSWORD
        generateValue: true
      - key: DEFAULT_ADMIN_NAME
        value: Admin User
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100